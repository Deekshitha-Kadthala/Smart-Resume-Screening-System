<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow" style="max-width:400px;margin:auto;">

        <h3 class="text-center">Admin Register</h3>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST">

            <input type="text" name="username" class="form-control mt-3" placeholder="Username" required>

            <input type="password" name="password" class="form-control mt-3" placeholder="Password" required>

            <button class="btn btn-success w-100 mt-3">Register</button>

        </form>

    </div>

</div>

</body>
</html>
