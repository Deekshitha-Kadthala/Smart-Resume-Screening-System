<!DOCTYPE html>
<html>
<head>

<title>Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Resume Screening Results</h2>

<table class="table table-bordered">

<thead>

<tr>
<th>Rank</th>
<th>Name</th>
<th>Email</th>
<th>Skills</th>
<th>Experience</th>
<th>ATS Score</th>
</tr>

</thead>

<tbody>

{% for candidate in candidates %}

<tr>

<td>{{ candidate.rank_position }}</td>

<td>{{ candidate.name }}</td>

<td>{{ candidate.email }}</td>

<td>{{ ", ".join(candidate.skills) }}</td>

<td>{{ candidate.experience }}</td>

<td>{{ candidate.final_score }}%</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/records" class="btn btn-success">
View Records
</a>

</div>

</body>
</html>
