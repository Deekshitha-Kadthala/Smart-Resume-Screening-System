<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Upload Resume</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">

    <a class="navbar-brand">AI Resume ATS System</a>

    <div>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="/upload" class="btn btn-outline-light btn-sm">Upload</a>
        <a href="/records" class="btn btn-outline-light btn-sm">Records</a>
        <a href="/download_excel" class="btn btn-success btn-sm">Excel</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>

</nav>

<div class="container mt-5">

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-warning">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">
            Upload Resumes
        </h2>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">

                <label class="form-label">
                    Upload Resume PDFs
                </label>

                <input
                    type="file"
                    name="resume"
                    class="form-control"
                    multiple
                    accept=".pdf"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Job Description
                </label>

                <textarea
                    name="jd"
                    class="form-control"
                    rows="8"
                    required></textarea>

            </div>

            <button type="submit" class="btn btn-primary w-100">
                Analyze Resumes
            </button>

        </form>

    </div>

</div>

</body>
</html>
