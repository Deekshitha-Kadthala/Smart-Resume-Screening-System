<!DOCTYPE html>
<html>
<head>
<title>Compare Candidates</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Compare Candidates</h2>

<form method="POST">

<input type="number"
name="id1"
placeholder="Candidate ID 1"
class="form-control mb-2">

<input type="number"
name="id2"
placeholder="Candidate ID 2"
class="form-control mb-2">

<button class="btn btn-primary">
Compare
</button>

</form>

{% if result %}

<hr>

<h4>{{ result.c1.name }}</h4>

<p>ATS Score:
{{ result.c1.final_score }}</p>

<h4>{{ result.c2.name }}</h4>

<p>ATS Score:
{{ result.c2.final_score }}</p>

{% endif %}

</div>

</body>
</html>
